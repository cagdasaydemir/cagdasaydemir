<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .header {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          height: 240px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 52px;
          position: relative;
          overflow: hidden;
          background: #0d1117;
        }

        /* Ambient orbs */
        .orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(80px);
        }
        .orb-1 {
          width: 350px; height: 350px;
          background: rgba(88, 166, 255, 0.07);
          top: -120px; right: 5%;
          animation: float1 12s ease-in-out infinite;
        }
        .orb-2 {
          width: 250px; height: 250px;
          background: rgba(126, 231, 135, 0.05);
          bottom: -100px; right: 25%;
          animation: float2 15s ease-in-out infinite;
        }
        .orb-3 {
          width: 180px; height: 180px;
          background: rgba(210, 168, 255, 0.04);
          top: 10px; left: 55%;
          animation: float3 18s ease-in-out infinite;
        }

        @keyframes float1 {
          0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
          25% { transform: translate(-15px, 10px) scale(1.08); opacity: 0.8; }
          50% { transform: translate(10px, -15px) scale(0.95); opacity: 0.6; }
          75% { transform: translate(5px, 8px) scale(1.05); opacity: 0.9; }
        }
        @keyframes float2 {
          0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
          33% { transform: translate(12px, -8px) scale(1.1); opacity: 0.7; }
          66% { transform: translate(-8px, 12px) scale(0.92); opacity: 0.5; }
        }
        @keyframes float3 {
          0%, 100% { transform: translate(0, 0); opacity: 0.3; }
          50% { transform: translate(-10px, -10px); opacity: 0.6; }
        }

        /* Content */
        .content { position: relative; z-index: 1; }
        .greeting {
          color: #484f58;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 5px;
          text-transform: uppercase;
          opacity: 0;
          animation: slideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
        }
        .name {
          font-size: 40px;
          font-weight: 700;
          margin-top: 10px;
          background: linear-gradient(135deg, #f0f6fc 0%, #79c0ff 50%, #d2a8ff 100%);
          background-size: 200% 200%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          animation: slideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.35s, shimmer 6s ease-in-out infinite 1.5s;
          opacity: 0;
        }
        @keyframes shimmer {
          0%, 100% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
        }
        .role {
          color: #8b949e;
          font-size: 16px;
          font-weight: 400;
          margin-top: 14px;
          opacity: 0;
          animation: slideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s;
        }
        .role em {
          font-style: normal;
          color: #7ee787;
        }
        .divider {
          width: 36px;
          height: 2px;
          margin-top: 18px;
          border-radius: 2px;
          background: linear-gradient(90deg, #58a6ff, #7ee787, #d2a8ff);
          background-size: 200% 100%;
          animation: slideIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.65s, gradientSlide 4s ease-in-out infinite 1.5s;
          opacity: 0;
        }
        @keyframes gradientSlide {
          0%, 100% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
        }
        @keyframes slideIn {
          0% { opacity: 0; transform: translateX(-16px); }
          100% { opacity: 1; transform: translateX(0); }
        }
      </style>
      <div class="header">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="content">
          <div class="greeting">Hello World</div>
          <div class="name">Cagdas Aydemir</div>
          <div class="role">Full-Stack Developer · <em>AI-augmented</em> workflow</div>
          <div class="divider"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
