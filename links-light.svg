<svg fill="none" viewBox="0 0 800 70" width="800" height="70" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .links {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          height: 70px;
          display: flex;
          align-items: center;
          gap: 14px;
          padding: 0;
        }
        .pill {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          padding: 12px 24px;
          border-radius: 100px;
          font-size: 15px;
          font-weight: 500;
          color: #24292f;
          background: linear-gradient(135deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.01) 100%);
          border: 1px solid rgba(0,0,0,0.08);
          opacity: 0;
          animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards, glowPulse 4s ease-in-out infinite 1s;
        }
        .pill:nth-child(1) { animation-delay: 0.1s, 1s; }
        .pill:nth-child(2) { animation-delay: 0.2s, 1.5s; }
        .pill:nth-child(3) { animation-delay: 0.3s, 2s; }
        .pill svg { flex-shrink: 0; }
        @keyframes popIn {
          0% { opacity: 0; transform: scale(0.92) translateY(4px); }
          100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes glowPulse {
          0%, 100% { border-color: rgba(0,0,0,0.08); box-shadow: none; }
          50% { border-color: rgba(9,105,218,0.15); box-shadow: 0 0 14px rgba(9,105,218,0.05); }
        }
      </style>
      <div class="links">
        <span class="pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0550ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          cagdasaydemir.com
        </span>
        <span class="pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#0550ae"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </span>
        <span class="pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0550ae" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
