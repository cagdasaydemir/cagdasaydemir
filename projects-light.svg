<svg fill="none" viewBox="0 0 800 340" width="800" height="340" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .grid {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 12px;
          padding: 4px;
        }
        .card {
          background: linear-gradient(145deg, rgba(0,0,0,0.025) 0%, rgba(0,0,0,0.005) 100%);
          border: 1px solid rgba(0,0,0,0.06);
          border-radius: 14px;
          padding: 22px;
          display: flex;
          flex-direction: column;
          gap: 12px;
          opacity: 0;
          animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards, cardBreath 6s ease-in-out infinite;
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
          background: linear-gradient(90deg, transparent, rgba(9,105,218,0.2), transparent);
          opacity: 0;
          animation: lineReveal 0.8s ease forwards;
        }
        .card:nth-child(1) { animation-delay: 0.05s, 1s; }
        .card:nth-child(1)::before { animation-delay: 0.4s; }
        .card:nth-child(2) { animation-delay: 0.1s, 1.3s; }
        .card:nth-child(2)::before { animation-delay: 0.5s; }
        .card:nth-child(3) { animation-delay: 0.15s, 1.6s; }
        .card:nth-child(3)::before { animation-delay: 0.6s; }
        .card:nth-child(4) { animation-delay: 0.2s, 1.9s; }
        .card:nth-child(4)::before { animation-delay: 0.7s; }
        .card:nth-child(5) { animation-delay: 0.25s, 2.2s; }
        .card:nth-child(5)::before { animation-delay: 0.8s; }
        .card:nth-child(6) { animation-delay: 0.3s, 2.5s; }
        .card:nth-child(6)::before { animation-delay: 0.9s; }
        @keyframes cardIn {
          0% { opacity: 0; transform: translateY(12px) scale(0.97); }
          100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes cardBreath {
          0%, 100% { border-color: rgba(0,0,0,0.06); }
          50% { border-color: rgba(0,0,0,0.09); }
        }
        @keyframes lineReveal {
          0% { opacity: 0; transform: scaleX(0); }
          100% { opacity: 1; transform: scaleX(1); }
        }
        .dot-row {
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .dot {
          width: 7px;
          height: 7px;
          border-radius: 50%;
          background: #116329;
          animation: dotPulse 3s ease-in-out infinite;
        }
        @keyframes dotPulse {
          0%, 100% { opacity: 0.5; box-shadow: none; }
          50% { opacity: 1; box-shadow: 0 0 6px rgba(22,101,52,0.2); }
        }
        .card-title {
          color: #24292f;
          font-size: 14px;
          font-weight: 600;
        }
        .card-desc {
          color: #57606a;
          font-size: 12px;
          line-height: 1.6;
        }
        .card-tag {
          display: inline-block;
          padding: 4px 12px;
          border-radius: 100px;
          font-size: 11px;
          font-weight: 500;
          color: #0550ae;
          background: rgba(9, 105, 218, 0.05);
          border: 1px solid rgba(9, 105, 218, 0.08);
          margin-top: auto;
          align-self: flex-start;
        }
      </style>
      <div class="grid">
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">yigitoglu.com</span></div>
          <div class="card-desc">Enterprise website with full CMS integration</div>
          <span class="card-tag">.NET · React</span>
        </div>
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">helbeto.com</span></div>
          <div class="card-desc">Enterprise website with custom design system</div>
          <span class="card-tag">.NET · React</span>
        </div>
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">rubin.com.tr</span></div>
          <div class="card-desc">Enterprise website with multi-language support</div>
          <span class="card-tag">.NET · React</span>
        </div>
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">valorygunesli.com</span></div>
          <div class="card-desc">Enterprise website with SEO optimization</div>
          <span class="card-tag">.NET · React</span>
        </div>
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">Multilingual CMS</span></div>
          <div class="card-desc">Content management platform serving 6 languages</div>
          <span class="card-tag">.NET · EF Core</span>
        </div>
        <div class="card">
          <div class="dot-row"><span class="dot"></span><span class="card-title">SOA Platform</span></div>
          <div class="card-desc">Service-oriented with caching, SEO &amp; monitoring</div>
          <span class="card-tag">.NET · Azure</span>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
