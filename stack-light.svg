              <svg width="16" height="16" viewBox="0 0 24 24" fill="#68217A"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm-.567 19.756l-5.31-3.07v-6.14l5.31 3.07v6.14zm.567-7.168L6.755 9.52l5.245-3.03 5.245 3.03L12 12.588zm5.877 4.098l-5.31 3.07v-6.14l5.31-3.07v6.14z"/></svg>
              C#
            </span>
