              <svg width="16" height="16" viewBox="0 0 24 24" fill="#512BD4"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0z"/></svg>
              ASP.NET MVC
